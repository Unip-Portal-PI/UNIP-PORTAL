name: docker_deploy

run-name: Docker build and deploy on server using actions.

env:
  REGISTRY: ghcr.io

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy.yml"
      - "backend/**"
      - "frontend/**"

jobs:
  docker_deploy:
    runs-on: ubuntu-latest
    environment: Deploy
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Set lowercase names
        run: |
          REPO_LC=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "BACKEND_IMAGE=ghcr.io/${REPO_LC}/backend" >> $GITHUB_ENV
          echo "FRONTEND_IMAGE=ghcr.io/${REPO_LC}/frontend" >> $GITHUB_ENV

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN || github.token }}

      - name: Docker meta backend
        id: meta_backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Docker meta frontend
        id: meta_frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta_backend.outputs.tags }}
          labels: ${{ steps.meta_backend.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta_frontend.outputs.tags }}
          labels: ${{ steps.meta_frontend.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            cd "${{ secrets.APP_DIR }}"
            docker login ghcr.io -u "${{ secrets.SSH_USER }}" -p "${{ secrets.GHCR_TOKEN || github.token }}"
            COMPOSE_FILE="${{ secrets.DEPLOY_COMPOSE_FILE }}"
            if [ -z "$COMPOSE_FILE" ]; then
              COMPOSE_FILE="docker-compose.yml"
            fi
            docker compose -f "$COMPOSE_FILE" pull backend frontend || docker compose -f "$COMPOSE_FILE" pull
            #docker compose -f "$COMPOSE_FILE" up -d --remove-orphans backend frontend || docker compose -f "$COMPOSE_FILE" up -d --remove-orphans
            docker compose -f "$COMPOSE_FILE" up -d --remove-orphans --scale frontend=5 --scale backend=5 frontend backend
            docker image prune -f
