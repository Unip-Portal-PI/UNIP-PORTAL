name: docker_deploy

run-name: Docker build and deploy on server using actions.

env:
  REGISTRY: ghcr.io

on:
  push:
    branches:
      - main

jobs:
  docker_deploy:
    runs-on: ubuntu-latest
    environment: Deploy
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Set lowercase names
        run: |
          REPO_LC=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "BACKEND_IMAGE=ghcr.io/${REPO_LC}/backend" >> $GITHUB_ENV
          echo "FRONTEND_IMAGE=ghcr.io/${REPO_LC}/frontend" >> $GITHUB_ENV

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN || github.token }}

      - name: Docker meta backend
        id: meta_backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Docker meta frontend
        id: meta_frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta_backend.outputs.tags }}
          labels: ${{ steps.meta_backend.outputs.labels }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta_frontend.outputs.tags }}
          labels: ${{ steps.meta_frontend.outputs.labels }}

      - name: Debug secrets
        run: |
          echo "HOST is set: ${{ secrets.SSH_HOST != '' }}"
          echo "USER is set: ${{ secrets.SSH_USER != '' }}"
          echo "KEY is set: ${{ secrets.SSH_KEY != '' }}"
          echo "APP_DIR is set: ${{ secrets.APP_DIR != '' }}"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            cd "${{ secrets.APP_DIR }}"
            docker login ghcr.io -u "${{ github.actor }}" -p "${{ secrets.GHCR_TOKEN || github.token }}"
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
