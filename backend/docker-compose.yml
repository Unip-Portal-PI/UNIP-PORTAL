services:
  db:
    image: mariadb:11
    container_name: portal_avp_db
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: "@true@false"
      MARIADB_DATABASE: portal_avp
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql

  minio:
    image: minio/minio
    container_name: minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: secure_senha
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  mariadb_data:
  minio_data: