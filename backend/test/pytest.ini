[pytest]
filterwarnings =
    ignore::DeprecationWarning:passlib.*
    ignore::DeprecationWarning:argon2.*

pythonpath = .
testpaths = test
# ==============================================================================
# CONFIGURAÇÃO DO PYTEST — AVP UNIP
# ==============================================================================

# Diretório raiz dos testes

# Exibe saídas do print() durante os testes (útil para debug)
addopts =
    -v
    --tb=short
    --no-header
    -rN

# Marcadores customizados para organização dos testes
markers =
    unit: Testes unitários isolados com mocks
    integration: Testes de integração com banco real
    slow: Testes que demoram mais de 1 segundo
